[build]
  command = "sh netlify-cache-bust.sh"
  publish = "."

[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    # JS tem query string ?v=<hash>, pode cachear agressivamente
    Cache-Control = "public, max-age=31536000, immutable"
